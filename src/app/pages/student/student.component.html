<div class="container">

  <h1>Student Management</h1>

  <div class="form-box">

    <h2>{{ isEdit ? 'Update Student' : 'Add Student' }}</h2>

    <form (ngSubmit)="isEdit ? updateStudent() : saveStudent()">

      <input type="text" placeholder="Name" [(ngModel)]="student.name" name="name" required>

      <input type="email" placeholder="Email" [(ngModel)]="student.email" name="email" required>

      <input type="text" placeholder="Mobile Number" [(ngModel)]="student.mobile" name="mobile" required>

      <select [(ngModel)]="student.course" name="course" required>
        <option value="">Select Course</option>
        <option value="Java Full Stack">Java Full Stack</option>
        <option value="Angular">Angular</option>
        <option value="Spring Boot">Spring Boot</option>
        <option value="Python">Python</option>
      </select>

      <input type="text" placeholder="Address" [(ngModel)]="student.address" name="address" required>

      <div class="gender-box">
        <label>
          <input type="radio" [(ngModel)]="student.gender" name="gender" value="Male">
          Male
        </label>

        <label>
          <input type="radio" [(ngModel)]="student.gender" name="gender" value="Female">
          Female
        </label>
      </div>

      <input type="date" [(ngModel)]="student.dob" name="dob" required>

      <button type="submit">
        {{ isEdit ? 'Update Student' : 'Save Student' }}
      </button>

      <button type="button" *ngIf="isEdit" (click)="cancelEdit()">
        Cancel
      </button>

    </form>

  </div>

  <hr>

  <div class="search-box">
    <input type="text" placeholder="Search by name" [(ngModel)]="searchName">
    <button (click)="searchStudent()">Search</button>
    <button (click)="getAllStudents()">Refresh</button>
  </div>

  <table border="1" cellpadding="10">

    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Mobile</th>
        <th>Course</th>
        <th>Address</th>
        <th>Gender</th>
        <th>DOB</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let student of students">
        <td>{{ student.id }}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.email }}</td>
        <td>{{ student.mobile }}</td>
        <td>{{ student.course }}</td>
        <td>{{ student.address }}</td>
        <td>{{ student.gender }}</td>
        <td>{{ student.dob }}</td>
        <td>
          <button (click)="editStudent(student)">Edit</button>
          <button (click)="deleteStudent(student.id)">Delete</button>
        </td>
      </tr>
    </tbody>

  </table>

</div>
